<!DOCTYPE html>
<html>

<head>
    <link href="node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="node_modules/bootswatch/dist/lux/bootstrap.min.css" rel="stylesheet">
    <script src="node_modules/vue/dist/vue.global.js"></script>
</head>

<body>
    <div id="app" class="container mt-5">
        <input v-model="word" class="form-control" placeholder="Введите слово">
        <button @click="translate" class="btn btn-primary mt-2">Перевести</button>
        <pre class="mt-3">{{ result }}</pre>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const word = ref('');
                const result = ref('');

                const translate = () => {
                    result.value = `Вы ввели: ${word.value}`;
                };

                return { word, result, translate };
            }
        }).mount('#app');
    </script>
</body>

</html>
